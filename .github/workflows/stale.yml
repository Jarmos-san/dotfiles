name: Close Stale Issues

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 7
          days-before-pr-stale: -1
          exempt-issue-labels: pinned
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed within a week if no further
            activity occurs. Thank you for your contributions.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not
            had recent activity. It will be closed within a week if no further
            activity occurs. Thank you for your contributions.
          close-issue-message: >
            This thread will now be closed since it hasn't seen any activity for
            a week. If your issue is still persisting, please feel free to
            reopen the thread or create a new one.
          close-pr-message: >
            This PR will now be closed since it hasn't seen any activity for a
            week. If you want to continue working on this PR, feel free to
            reopen it or create a new one, marking this one as "superseded".
          exempt-pr-labels: dependencies
